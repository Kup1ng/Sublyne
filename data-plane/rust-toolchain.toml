[toolchain]
# Pinned to 1.85.0 — first stable with Cargo's `edition2024` feature,
# which the constant_time_eq v0.4.2 transitive dep requires. Matches
# the toolchain set by .github/workflows/{ci,release}.yml. Bump
# deliberately when we're ready to re-format the codebase or accept
# a new lockfile baseline.
channel = "1.85.0"
targets = ["x86_64-unknown-linux-musl"]
components = ["rustfmt", "clippy"]
profile = "minimal"
